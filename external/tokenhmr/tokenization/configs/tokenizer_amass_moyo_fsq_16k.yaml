EXP:
  NAME: 'tokenization_transformer_fsq_16k'
  OUT_DIR: 'output'
  DEBUG: FALSE
  PRINT_ITER: 100
  EVAL_ITER: 1000
  TR_DISP_ITER: 1000
  VAL_DISP_ITER: 50
  EVAL_ONLY: False
  EVAL_DS: 'test'
  RESUME_PTH: ''
  RESUME_TRAINING: False
  LOG_TB: True
DATA:
  DATA_ROOT: 'tokenization_data'
  DATASET: 'amass_pose'
  TRAINLIST: 'CMU_KIT_BMLrub_DanceDB_BMLmovi_EyesJapan_BMLhandball_TotalCapture_EKUT_ACCAD_TCDHands_MPI-Limits_MOYO'
  TRAIN_PART: '0.12_0.11_0.11_0.05_0.05_0.05_0.05_0.05_0.03_0.03_0.03_0.16_0.16'
  VALLIST: 'HumanEva_HDM05_SFU_MPI-Mosh_MOYO'
  TESTLIST: 'Transitions_SSM'
  ADD_NOISE: False
  BATCH_SIZE: 512
  MASK_BODY_PARTS: False
  NUM_WORKERS: 15
OPT:
  TOTAL_ITER: 400000
  WARM_UP_ITER: 10000
  LR: 3e-4
  WEIGHT_DECAY: 1e-5
  SCHEDULER: 'cosine'
  LR_SCHEDULER: '75000:100000'
  GAMMA: 0.05
  MIN_LR: 1e-7
LOSS:
  POSE_LOSS_WT: 20.0
  JNT_LOSS_WT: 100.0
  MESH_LOSS_WT: 100.0
  COMMIT_LOSS_WT: 0.0          # FSQ has no commitment loss; quantizer returns 0.
  LOSS_WT: 1.0
  POSE_LOSS: 'l2'
  MESH_LOSS: 'wt_l2'
  JNT_LOSS: 'l2'
  ONLY_VALID_JNT: True
ARCH:
  MODEL_NAME: transformer
  CODE_DIM: [256]              # ignored when QUANTIZER='fsq' (overridden by len(FSQ_LEVELS))
  NB_CODE: [2048]              # ignored when QUANTIZER='fsq' (overridden by prod(FSQ_LEVELS))
  ROT_TYPE: 'rot6d'
  QUANTIZER: 'fsq'
  # 15360 codes (≈ 2^14), d=5. Paper App. A.4.1 recommendation for 2^14.
  # Outer list wraps the inner so the grid-search expander treats it as ONE config,
  # not a sweep over individual levels (same pattern as CODE_DIM: [256]).
  FSQ_LEVELS: [[8, 8, 8, 6, 5]]
  DIST_METRIC: 'cosine'        # unused under FSQ
  SMPL_TYPE: 'smplh'
  DOWN_T: 1
  WIDTH: 512
  DEPTH: 2
  DILATION_RATE: 3
  CB_SCALE_DOWN: 2
  TOKEN_SIZE_MUL: 4
  TOKEN_SIZE_DIV: 4
  NUM_TOKENS: 160
  USE_KINEMATIC_PE: True
  DROPOUT: 0.0
  EMB_DROPOUT: 0.0
  EMB_DROPOUT_TYPE: 'drop'
  CROSS_ATTN_DROPOUT: 0.0
  FFN_MULT: 4
  N_DOWN_BLOCKS: 2
  N_UP_BLOCKS: 2
